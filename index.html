<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F5F5F5">
    <title>HCQuick</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="app">

        <!-- ==================== 顶部标题栏 ==================== -->
        <div id="top-bar">
            <span id="nav-icon"></span>
            <span id="back-btn" style="display:none;" onclick="backToBrandSpec()"><</span>
            <span id="title">HCQuick</span>
            <span id="menu-btn" style="position:relative;">
                ⊕
                <span id="menu-badge-dot" style="display:none;position:absolute;top:4px;right:4px;width:8px;height:8px;background:#E53935;border-radius:50%;"></span>
            </span>
        </div>

        <!-- ==================== 下拉菜单 ==================== -->
        <div id="dropdown-menu" style="display:none;">
            <div class="menu-item" onclick="showAddBrandDialog()">+ 增加品牌</div>
            <div class="menu-item" onclick="showAddSpecDialog()">+ 增加规格</div>
            <div class="divider"></div>
            <div class="menu-item" onclick="handleSync()">
                🔄 同步
                <span id="sync-badge" style="display:none;background:#E53935;color:#fff;border-radius:50%;min-width:18px;height:18px;text-align:center;line-height:18px;font-size:10px;margin-left:8px;">1</span>
            </div>
            <div class="divider"></div>
            <div class="menu-item" onclick="showLogDialog()">📋 日志</div>
            <div class="menu-item" onclick="showSettingsDialog()">⚙️ 设置</div>
        </div>

        <!-- ==================== 品牌/规格页面 ==================== -->
        <div id="brand-spec-page">
            <div id="line-selector">
                <button class="line-btn selected" data-line="V">V</button>
                <button class="line-btn" data-line="C">C</button>
                <button class="line-btn" data-line="R">R</button>
            </div>
            <div class="section">
                <div class="section-title">品牌</div>
                <div id="brand-grid" class="grid-container"></div>
            </div>
            <div class="section">
                <div class="section-title">规格</div>
                <div id="spec-grid" class="grid-container"></div>
            </div>
        </div>

        <!-- ==================== 材料计算页面 ==================== -->
                <!-- ==================== 材料计算页面 ==================== -->
        <div id="calc-page" style="display:none;">
            <div id="input-row">
                <div class="x-input-wrapper">
                    <label class="x-label">X (kg)</label>
                    <input type="text" id="input-x" inputmode="decimal">
                </div>
                <div class="equal-sign">=</div>
<div class="result-wrapper">
    <label class="result-label">EA</label>
    <div id="result-box">0.0</div>
</div>
            </div>
            <div id="material-grid" class="grid-container"></div>
            <div id="promo-card" onclick="openPromoDialog()">促销标签: 请选择代码</div>
            <div id="sub-options"></div>
            <div id="property-card"></div>
        </div>
    <!-- ==================== 促销标签选择对话框 ==================== -->
    <div id="promo-dialog-overlay" style="display:none;">
        <div id="promo-dialog">
            <div id="promo-dialog-title">选择促销标签</div>
            <input type="text" id="promo-search" inputmode="numeric">
            <div id="promo-grid-container">
                <div id="promo-grid" class="promo-grid"></div>
            </div>
            <button id="promo-dialog-close">关闭</button>
        </div>
    </div>
<!-- ==================== 材料编辑弹窗 ==================== -->
<div id="material-edit-overlay" style="display:none;">
    <div id="material-edit-dialog">
        <div id="material-edit-title">新增材料</div>

        <!-- 名称（非促销标签显示） -->
        <div id="me-row-name" class="me-row">
            <label class="me-label">名称</label>
            <input type="text" id="me-name" class="me-input">
        </div>

        <!-- 标签CODE（仅促销标签显示） -->
        <div id="me-row-code" class="me-row" style="display:none;">
            <label class="me-label">标签CODE</label>
            <input type="text" id="me-code" class="me-input" inputmode="numeric">
        </div>

        <!-- P1=单个净重 (g) (瓶子、泵盖显示) -->
        <div id="me-row-p1" class="me-row" style="display:none;">
            <label class="me-label">P1=单个净重 (g)</label>
            <input type="text" id="me-p1" class="me-input" inputmode="decimal">
        </div>

        <!-- T1=纸箱去皮 (kg) (仅泵盖显示) -->
        <div id="me-row-t1" class="me-row" style="display:none;">
            <label class="me-label">T1=纸箱去皮 (kg)</label>
            <input type="text" id="me-t1" class="me-input" inputmode="decimal">
        </div>

        <!-- T2=胶箱去皮 (kg) (仅泵盖显示) -->
        <div id="me-row-t2" class="me-row" style="display:none;">
            <label class="me-label">T2=胶箱去皮 (kg)</label>
            <input type="text" id="me-t2" class="me-input" inputmode="decimal">
        </div>

        <!-- M=整卷重量 (kg) (标签、促销标签显示) -->
        <div id="me-row-m" class="me-row" style="display:none;">
            <label class="me-label">M=整卷重量 (kg)</label>
            <input type="text" id="me-m" class="me-input" inputmode="decimal">
        </div>

        <!-- C=卷芯重量 (kg) (标签、促销标签显示) -->
        <div id="me-row-c" class="me-row" style="display:none;">
            <label class="me-label">C=卷芯重量 (kg)</label>
            <input type="text" id="me-c" class="me-input" inputmode="decimal">
        </div>

        <!-- Q=整卷数量 (EA) (标签、促销标签显示) -->
        <div id="me-row-q" class="me-row" style="display:none;">
            <label class="me-label">Q=整卷数量 (EA)</label>
            <input type="text" id="me-q" class="me-input" inputmode="numeric">
        </div>

        <!-- 备注（所有类型显示） -->
        <div id="me-row-remark" class="me-row">
            <label class="me-label">备注</label>
            <input type="text" id="me-remark" class="me-input">
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;">
            <button id="me-btn-cancel" class="dialog-btn-cancel" style="flex:1;">取消</button>
            <button id="me-btn-save" class="dialog-btn-danger" style="flex:1;">保存</button>
        </div>
    </div>
</div>
        <!-- ==================== 日志查看对话框 ==================== -->
<div id="log-viewer-overlay" style="display:none;">
    <div id="log-viewer-dialog">
        <div id="log-viewer-title">本地修改日志</div>
        <div id="log-viewer-list"></div>
        <button id="log-viewer-close" class="dialog-btn-cancel" style="margin-top:12px;width:100%;">关闭</button>
    </div>
</div>
    <!-- ==================== 同步确认弹窗 ==================== -->
    <div id="sync-confirm-overlay" style="display:none;">
        <div id="sync-confirm-dialog">
            <div id="sync-confirm-title">⚠️ 强制同步确认</div>
            <div id="sync-confirm-body">以下本地修改将被服务器数据覆盖：</div>
            <div id="sync-confirm-list"></div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button id="sync-confirm-cancel" class="dialog-btn-cancel">取消</button>
                <button id="sync-confirm-ok" class="dialog-btn-danger">强制更新</button>
            </div>
        </div>
    </div>

    <!-- ==================== 设置对话框 ==================== -->
    <div id="settings-overlay" style="display:none;">
        <div id="settings-dialog">
            <div id="settings-title">设置</div>
            <div id="settings-content">
                <div style="display:flex;justify-content:space-around;margin-bottom:12px;">
                    <label><input type="radio" name="syncMode" value="standalone" id="radio-standalone" onchange="setSyncMode('standalone')"> 单机版</label>
                    <label><input type="radio" name="syncMode" value="netdisk" id="radio-netdisk" onchange="setSyncMode('netdisk')"> 云盘版</label>
                </div>
                <div class="divider"></div>
                <div style="display:flex;gap:8px;margin:12px 0;">
                    <button onclick="importJson()" style="flex:1;height:36px;background:#4CAF50;color:#fff;border:none;border-radius:8px;">📁 导入</button>
                    <button onclick="exportJson()" style="flex:1;height:36px;background:#2196F3;color:#fff;border:none;border-radius:8px;">📤 导出</button>
                </div>
                <div style="margin-top:8px;">
                    <div style="font-size:13px;font-weight:500;margin-bottom:2px;">自定义服务器地址（云盘版）</div>
                    <input type="text" id="settings-base-url" placeholder="基础 URL" style="width:100%;margin-top:4px;padding:6px;font-size:12px;border:1px solid #E5E5E5;border-radius:4px;" onchange="updateUrlPreview()">
                    <input type="text" id="settings-data-file" placeholder="数据文件名" style="width:100%;margin-top:4px;padding:6px;font-size:12px;border:1px solid #E5E5E5;border-radius:4px;" onchange="updateUrlPreview()">
                    <input type="text" id="settings-version-file" placeholder="版本文件名" style="width:100%;margin-top:4px;padding:6px;font-size:12px;border:1px solid #E5E5E5;border-radius:4px;" onchange="updateUrlPreview()">
                    <div style="font-size:10px;color:#888;margin-top:4px;">完整数据 URL 预览: <span id="settings-url-preview">-</span></div>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin:8px 0;">
    <span>Data版本: <span id="settings-data-version">-</span></span>
    <span>APK版本: <span id="settings-apk-version">-</span></span>
</div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button onclick="closeSettingsDialog()" style="flex:1;height:36px;border:1px solid #E5E5E5;border-radius:8px;background:#fff;">取消</button>
                <button onclick="saveAndRestart()" style="flex:1;height:36px;border:none;border-radius:8px;background:#4CAF50;color:#fff;font-size:14px;">保存并重启</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="brand-spec.js"></script>
    <script src="material-calc.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
        // 如果是通过 ?force-reload 访问的，清除参数并强制刷新
    if (window.location.search.includes('force-reload')) {
        history.replaceState(null, '', window.location.pathname);
        location.reload(true);
    }
    </script>
</body>
</html>
